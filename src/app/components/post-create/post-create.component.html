<div class="min-h-screen bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
      <a routerLink="/posts" class="text-xl font-bold text-blue-600">Blog App</a>
      <a routerLink="/posts" class="text-gray-600 text-sm hover:text-blue-600 transition">← Zpět</a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border p-8">

      <h2 class="text-2xl font-bold text-gray-800 mb-6">Nový článek</h2>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nadpis</label>
          <input
            type="text"
            [(ngModel)]="title"
            name="title"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Nadpis článku"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Úryvek</label>
          <input
            type="text"
            [(ngModel)]="excerpt"
            name="excerpt"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Krátký popis článku"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Obsah</label>
          <textarea
            [(ngModel)]="content"
            name="content"
            required
            rows="12"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            placeholder="Obsah článku..."
          ></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select
            [(ngModel)]="status"
            name="status"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="PUBLISHED">Publikováno</option>
            <option value="DRAFT">Koncept</option>
          </select>
        </div>

        <div class="flex gap-3">
          <button
            type="submit"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
            Publikovat
          </button>
          <a routerLink="/posts"
            class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200 transition font-medium">
            Zrušit
          </a>
        </div>
      </form>

    </div>
  </div>
</div>
